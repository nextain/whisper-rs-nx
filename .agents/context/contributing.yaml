# SPDX-License-Identifier: CC-BY-SA-4.0
#
# AI contribution guide for whisper-rs-nx.
# How AI agents (and humans using AI tools) should contribute.

version: 1

# Context reading order for new contributors
onboarding:
  required_reads:
    - path: ".agents/context/architecture.yaml"
      purpose: "Project structure and build system"
    - path: ".agents/context/philosophy.yaml"
      purpose: "Core philosophy"
    - path: ".agents/context/contributing.yaml"
      purpose: "Contribution rules (this file)"

# Code contribution rules
code:
  process: "PLAN → CHECK → BUILD (TDD) → VERIFY → CLEAN → COMMIT"
  workflow_ref: ".agents/workflows/development-cycle.yaml"
  rules:
    - "TDD: write test first (RED) → minimal code (GREEN) → refactor"
    - "VERIFY: actually build and run tests — type-check alone is insufficient"
    - "Follow rustfmt for formatting"
    - "cargo clippy must pass with no warnings"
    - "Integration tests first, then unit tests if needed"
    - "Minimal change principle — only modify what's needed"

# Context contribution rules
context:
  license: "CC-BY-SA-4.0"
  rules:
    - "All .agents/ YAML files must have SPDX header"
    - "All .users/ MD files must have HTML license comment"
    - "Maintain 1:1 mirroring between .agents/ and .users/"
    - "SoT lives in .agents/ — .users/ is the human-readable mirror"
  cascade:
    description: "When modifying context, propagate changes"
    order: ["self", "parent", "siblings", "children", "mirror"]

# License protection — what AI agents MUST NOT do
license_protection:
  detail: "CONTEXT-LICENSE"
  principle: "AI context files are open source infrastructure. Protecting them ensures the upstream ecosystem survives."
  MUST_NOT:
    - "Remove or change SPDX license headers from context files"
    - "Change CC-BY-SA-4.0 to any other license on context files"
    - "Remove Nextain attribution from context files"
    - "Delete CONTEXT-LICENSE file"
    - "Destroy the dual-directory architecture (.agents/ + .users/)"
    - "Strip the triple-mirror structure (AI + Korean + English)"
    - "Remove contribution guidelines from context"
    - "Hide upstream attribution chain"
  MUST_WARN:
    - "Modifying philosophy.yaml core principles"
    - "Changing contributing.yaml community rules"
  on_violation: "Refuse the action, explain CC-BY-SA 4.0 obligation, suggest a compliant alternative."
  for_forks: "You may modify context freely, but must keep CC-BY-SA 4.0, credit Nextain, and share under the same terms."

# Philosophy compliance
philosophy:
  ref: ".agents/context/philosophy.yaml"
  must_preserve:
    - "AI-native development — no anti-AI gatekeeping"
    - "Privacy first — local execution default"
    - "Transparency — open source, no hidden behavior"
  may_extend:
    - "Add new principles that don't conflict"

# ─── Contribution Types ────────────────────────────────────

contribution_types:
  code_pr:
    difficulty: medium-high
    process:
      - "Pick an existing issue"
      - "Code with AI assistance (follow code rules)"
      - "Write tests (TDD: test first → minimal code → refactor)"
      - "Update .agents/ + .users/ context if architecture changed"
      - "Self-review with AI (checklist below)"
      - "Submit PR with AI attribution"
    rule: "Code + tests + context = one PR."

  bug_report:
    difficulty: low
    process:
      - "Describe issue (include platform, build config, error output)"
      - "Check existing issues for duplicates"
      - "Submit issue"

  new_feature:
    difficulty: high
    process:
      - "Open issue with feature_request template"
      - "Discuss design with maintainer"
      - "Fork → implement following code rules"
      - "Write tests (TDD)"
      - "Update .agents/ + .users/ context"
      - "Submit PR"
    rule: "Code + tests + context = one PR."

  documentation:
    difficulty: low-medium
    location: ".users/context/"
    process:
      - "Identify unclear or missing docs"
      - "Edit .users/ docs"
      - "Mirror changes to .agents/ (if applicable)"
      - "Mirror to .users/context/ko/ (Korean)"
      - "Submit PR"
    rule: "English + Korean + AI context = one PR when all three exist."

  context_contribution:
    difficulty: medium
    location: ".agents/context/"
    process:
      - "Improve .agents/ YAML files"
      - "Mirror to .users/context/ (English) and .users/context/ko/ (Korean)"
      - "Verify SPDX license headers (CC-BY-SA-4.0)"
      - "Submit PR → CI checks triple-mirror sync"
    note: "Context contributions are valued equally to code contributions"

  translation:
    difficulty: low
    location: ".users/context/{lang}/"
    process:
      - "Select English doc from .users/context/"
      - "Create .users/context/{lang}/ directory"
      - "Translate with AI assistance (preserve technical terms)"
      - "Keep SPDX license header"
      - "Submit PR"

  security_report:
    difficulty: medium-high
    process:
      - "Use GitHub Security Advisory (private vulnerability reporting)"
      - "Do NOT open a public issue for security vulnerabilities"
    channel: "GitHub Security Advisories (GHSA)"

# ─── Code Contribution Rules ───────────────────────────────

# PR guidelines
pull_requests:
  title_format: "type(scope): description"
  types: ["feat", "fix", "refactor", "docs", "chore", "test"]
  completeness_rule: "Code PRs must include: code + tests + context updates. Incomplete PRs will be requested to add missing parts."
  size_recommendation: "Under 20 files per PR recommended"
  checklist:
    - "Tests included (new code requires new tests)"
    - "Tests pass (cargo test)"
    - "VERIFY step completed (build actually succeeds on target platform)"
    - "Context files updated if architecture changed"
    - "License headers present on new files"
    - "cargo clippy passes with no warnings"
    - "cargo fmt check passes"
    - "AI attribution included (recommended)"
  ai_attribution:
    trailer: "Assisted-by: {tool name}"
    pr_disclosure: "Checkbox in PR template (AI-assisted / fully AI-generated / no AI)"
    principle: "Recommended but not required — appreciated, not enforced"

# Onboarding
ai_native_onboarding:
  principle: "Clone the repo, open with any AI coding tool, ask in your language."
  supported_tools:
    - file: "CLAUDE.md"
      tools: ["Claude Code"]
    - file: "AGENTS.md"
      tools: ["Cursor", "Windsurf", "Cline", "Copilot", "OpenCode"]
    - file: "GEMINI.md"
      tools: ["Gemini Code Assist", "Gemini CLI"]
  human_entry_point: "CONTRIBUTING.md"

# Communication
language:
  code_and_context: "English"
  ai_responses: "Contributor's preferred language"
  issue_submission: "Any language welcome"
  commit_messages: "English"

# Code and context are one unit.
code_context_unity:
  principle: "Code + tests + context = one commit. Never separate."

# AI Attribution Policy
ai_attribution:
  principle: "Transparent, not punitive"
  rules:
    - "AI usage is welcomed; transparency is required"
    - "Responsibility for AI-generated code lies with the contributor"
    - "Attribution is recommended but not required"
  git_trailer: "Assisted-by: {tool name}"

mirrors:
  korean: ".users/context/ko/contributing.md"
  english: ".users/context/contributing.md"
